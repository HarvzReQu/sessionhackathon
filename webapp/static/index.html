<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DOOMDADA Game Portal</title>
  <style>
    :root {
      --bg: #070a0f;
      --panel: #101722;
      --text: #f8fafc;
      --muted: #9fb0c0;
      --accent: #22c55e;
      --danger: #ff3f81;
      --line: #274156;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Consolas, "Courier New", monospace;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 10%, #12322f 0%, transparent 30%),
        radial-gradient(circle at 80% 80%, #2c1533 0%, transparent 35%),
        linear-gradient(140deg, #05070b, var(--bg));
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .panel {
      width: min(720px, 100%);
      background: rgba(13, 19, 29, 0.92);
      border: 1px solid var(--line);
      box-shadow: 0 0 0 1px rgba(34, 197, 94, 0.3), 0 14px 40px rgba(0, 0, 0, 0.45);
      border-radius: 14px;
      overflow: hidden;
    }
    .header {
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, rgba(34, 197, 94, 0.12), rgba(255, 63, 129, 0.12));
    }
    .header h1 { margin: 0; font-size: 1.2rem; color: var(--accent); }
    .header p { margin: 8px 0 0; color: var(--muted); }
    .body { padding: 20px; display: grid; gap: 14px; }
    label { display: grid; gap: 8px; font-size: 0.95rem; }
    input, select, button {
      font: inherit;
      border-radius: 10px;
      border: 1px solid #2f4658;
      background: #09111a;
      color: var(--text);
      padding: 12px;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.25);
    }
    button {
      background: linear-gradient(120deg, #0f6f3b, #15924f);
      border: 0;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { filter: brightness(1.1); }
    .status {
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #2a3f53;
      background: #0a121b;
      color: var(--muted);
      min-height: 48px;
    }
    .status.error {
      border-color: #793252;
      color: #ffd4e4;
      background: #27101a;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .tile {
      border: 1px solid #2a3f53;
      border-radius: 10px;
      padding: 10px;
      background: #0a121b;
      text-align: center;
    }
    .tile strong { display: block; font-size: 1.2rem; color: var(--accent); }
    .game-panel {
      border: 1px solid #2a3f53;
      border-radius: 10px;
      background: #0a121b;
      padding: 12px;
    }
    .levels {
      margin-top: 10px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .level-card {
      border: 1px solid #334a5e;
      border-radius: 10px;
      background: #0c1620;
      padding: 10px;
    }
    .level-card h4 {
      margin: 0;
      color: #86efac;
      font-size: 1rem;
    }
    .level-card p {
      margin: 8px 0;
      color: #b8c7d3;
      font-size: 0.92rem;
    }
    .level-card .pts {
      color: #facc15;
      font-size: 0.9rem;
      font-weight: 700;
    }
    .level-card button {
      margin-top: 10px;
      width: 100%;
      background: linear-gradient(120deg, #0c4a6e, #0284c7);
    }
    .level-card.done {
      border-color: #22c55e;
      box-shadow: inset 0 0 0 1px rgba(34, 197, 94, 0.3);
    }
    .level-card .done-tag {
      margin-top: 8px;
      color: #86efac;
      font-size: 0.85rem;
      font-weight: 700;
    }
    .challenge-panel {
      margin-top: 12px;
      border: 1px solid #35556d;
      border-radius: 10px;
      background: #0c1622;
      padding: 12px;
      display: grid;
      gap: 10px;
    }
    .challenge-panel h4 {
      margin: 0;
      color: #93c5fd;
    }
    .challenge-panel pre {
      margin: 0;
      border: 1px solid #2f4658;
      border-radius: 8px;
      background: #08111a;
      color: #dbeafe;
      padding: 10px;
      white-space: pre-wrap;
      font-family: Consolas, "Courier New", monospace;
      font-size: 0.9rem;
    }
    .hidden { display: none; }
    @media (max-width: 640px) {
      .stats { grid-template-columns: 1fr; }
      .levels { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <section class="panel">
    <div class="header">
      <h1>DOOMDADA Game Portal</h1>
      <p>Sign in, then start the reverse engineering challenges immediately.</p>
    </div>
    <div class="body">
      <div id="loginPanel" class="game-panel">
        <strong>Login</strong>
        <label>
          Username
          <input id="usernameInput" maxlength="20" placeholder="Doom" />
        </label>
        <label>
          Password
          <input id="passwordInput" maxlength="20" type="password" placeholder="Dada" />
        </label>
        <button id="loginBtn">Enter Game</button>
      </div>

      <div id="status" class="status">Use username Doom and password Dada.</div>

      <div id="gamePanel" class="game-panel hidden">
        <strong>Main Game Screen</strong>
        <div class="levels" id="levelsGrid"></div>
        <div id="challengePanel" class="challenge-panel hidden">
          <h4 id="challengeTitle">Challenge</h4>
          <div id="challengeMeta" class="status">-</div>
          <pre id="challengePrompt"></pre>
          <label>
            Your Flag Answer
            <input id="answerInput" maxlength="200" placeholder="e.g. DOOM{...}" />
          </label>
          <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <button id="submitAnswerBtn">Submit Answer</button>
            <button id="closeChallengeBtn" type="button">Back to Levels</button>
          </div>
          <div id="answerResult" class="status">Pick a level to start.</div>
        </div>
      </div>
    </div>
  </section>

  <script>
    const loginPanelEl = document.getElementById("loginPanel");
    const usernameInputEl = document.getElementById("usernameInput");
    const passwordInputEl = document.getElementById("passwordInput");
    const loginBtn = document.getElementById("loginBtn");
    const statusEl = document.getElementById("status");
    const gamePanelEl = document.getElementById("gamePanel");
    const levelsGridEl = document.getElementById("levelsGrid");
    const challengePanelEl = document.getElementById("challengePanel");
    const challengeTitleEl = document.getElementById("challengeTitle");
    const challengeMetaEl = document.getElementById("challengeMeta");
    const challengePromptEl = document.getElementById("challengePrompt");
    const answerInputEl = document.getElementById("answerInput");
    const submitAnswerBtn = document.getElementById("submitAnswerBtn");
    const closeChallengeBtn = document.getElementById("closeChallengeBtn");
    const answerResultEl = document.getElementById("answerResult");
    const API_BASE = window.location.protocol === "file:" ? "http://127.0.0.1:8000" : "";

    let levelsLoaded = false;
    let selectedLevelId = "";
    let levelsById = {};
    let levelOrder = [];
    const solvedLevels = new Set();

    function apiUrl(path) {
      return `${API_BASE}${path}`;
    }

    function setStatus(text, isError = false) {
      statusEl.textContent = text;
      statusEl.classList.toggle("error", isError);
    }

    function showGameScreen() {
      loginPanelEl.classList.add("hidden");
      gamePanelEl.classList.remove("hidden");
      if (!levelsLoaded) {
        loadGameLevels();
      }
    }

    function renderLevels(levels) {
      if (!levels.length) {
        levelsGridEl.innerHTML = "<div class='level-card'>No levels available yet.</div>";
        return;
      }
      levelsById = Object.fromEntries(levels.map(level => [level.id, level]));
      levelOrder = levels.map(level => level.id);
      levelsGridEl.innerHTML = levels.map(level => `
        <article class="level-card ${solvedLevels.has(level.id) ? "done" : ""}">
          <h4>${level.title}</h4>
          <p>${level.description}</p>
          <div class="pts">${level.points} points</div>
          <button type="button" data-level-id="${level.id}">${solvedLevels.has(level.id) ? "Review Challenge" : "Open Challenge"}</button>
          ${solvedLevels.has(level.id) ? '<div class="done-tag">Solved</div>' : ""}
        </article>
      `).join("");

      levelsGridEl.querySelectorAll("button[data-level-id]").forEach(btn => {
        btn.addEventListener("click", () => {
          const levelId = btn.getAttribute("data-level-id");
          if (levelId) {
            openChallenge(levelId);
          }
        });
      });
    }

    async function openChallenge(levelId) {
      try {
        const res = await fetch(apiUrl(`/api/game/levels/${encodeURIComponent(levelId)}`));
        const data = await res.json();
        if (!res.ok) {
          setStatus(data.detail || "Could not load challenge.", true);
          return;
        }

        selectedLevelId = data.id;
        challengeTitleEl.textContent = `${data.title} Challenge`;
        challengeMetaEl.textContent = `${data.description} | ${data.points} points`;
        challengePromptEl.textContent = data.challenge_prompt;
        answerInputEl.value = "";
        answerResultEl.textContent = "Submit your answer to validate.";
        challengePanelEl.classList.remove("hidden");
      } catch {
        setStatus("Network error while loading challenge.", true);
      }
    }

    async function loadGameLevels() {
      try {
        const res = await fetch(apiUrl("/api/game/levels"));
        if (!res.ok) {
          return;
        }
        const levels = await res.json();
        levelsLoaded = true;
        renderLevels(levels);
        if (levels.length) {
          const nextId = levels.find(level => !solvedLevels.has(level.id))?.id || levels[0].id;
          openChallenge(nextId);
        }
      } catch {
      }
    }

    function getNextUnsolvedLevelId(currentLevelId) {
      if (!levelOrder.length) {
        return "";
      }

      const currentIndex = levelOrder.indexOf(currentLevelId);
      for (let idx = currentIndex + 1; idx < levelOrder.length; idx += 1) {
        const candidate = levelOrder[idx];
        if (!solvedLevels.has(candidate)) {
          return candidate;
        }
      }

      return "";
    }

    function attemptLogin() {
      const username = usernameInputEl.value.trim();
      const password = passwordInputEl.value.trim();

      if (username === "Doom" && password === "Dada") {
        setStatus("Login successful. Welcome to DOOMDADA.");
        showGameScreen();
        return;
      }

      setStatus("Invalid credentials. Use Doom / Dada.", true);
    }

    loginBtn.addEventListener("click", attemptLogin);
    passwordInputEl.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        attemptLogin();
      }
    });

    submitAnswerBtn.addEventListener("click", async () => {
      if (!selectedLevelId) {
        answerResultEl.textContent = "Open a challenge first.";
        return;
      }

      const answer = answerInputEl.value.trim();
      if (!answer) {
        answerResultEl.textContent = "Answer is required.";
        return;
      }

      submitAnswerBtn.disabled = true;
      answerResultEl.textContent = "Checking answer...";

      try {
        const res = await fetch(apiUrl("/api/game/submit"), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ level_id: selectedLevelId, answer })
        });
        const data = await res.json();
        if (!res.ok) {
          answerResultEl.textContent = data.detail || `Could not submit answer (HTTP ${res.status}).`;
          return;
        }

        answerResultEl.textContent = data.message;
        if (data.correct) {
          solvedLevels.add(selectedLevelId);
          renderLevels(Object.values(levelsById));
          setStatus(`Correct on ${selectedLevelId.toUpperCase()}. ${data.message}`);

          const nextLevelId = getNextUnsolvedLevelId(selectedLevelId);
          if (nextLevelId) {
            answerResultEl.textContent = `${data.message} Loading next challenge...`;
            setTimeout(() => {
              openChallenge(nextLevelId);
            }, 450);
          } else {
            answerResultEl.textContent = "All challenges completed. Great run!";
            challengeMetaEl.textContent = "Completed all available levels.";
            challengePromptEl.textContent = "You cleared the full web challenge set. You can review any level from the cards above.";
          }
        }
      } catch {
        answerResultEl.textContent = "Network error while submitting answer.";
      } finally {
        submitAnswerBtn.disabled = false;
      }
    });

    closeChallengeBtn.addEventListener("click", () => {
      challengePanelEl.classList.add("hidden");
      selectedLevelId = "";
    });
  </script>
</body>
</html>
