<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DOOMDADA Minigame</title>
  <style>
    :root {
      --bg: #070a0f;
      --panel: #101722;
      --text: #f8fafc;
      --muted: #9fb0c0;
      --accent: #22c55e;
      --line: #274156;
      --warn: #facc15;
      --danger: #ff4d6d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Consolas, "Courier New", monospace;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 10%, #0f3a31 0%, transparent 28%),
        radial-gradient(circle at 90% 90%, #3a102a 0%, transparent 32%),
        linear-gradient(140deg, #04060b, var(--bg));
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .panel {
      width: min(900px, 100%);
      background: rgba(13, 19, 29, 0.95);
      border: 1px solid var(--line);
      box-shadow: 0 0 0 1px rgba(34, 197, 94, 0.25), 0 18px 40px rgba(0, 0, 0, 0.5);
      border-radius: 14px;
      overflow: hidden;
    }
    .header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, rgba(34, 197, 94, 0.16), rgba(255, 77, 109, 0.14));
    }
    .header h1 { margin: 0; color: var(--accent); font-size: 1.3rem; }
    .header p { margin: 8px 0 0; color: var(--muted); }
    .body { padding: 16px; display: grid; gap: 12px; }
    .status {
      border: 1px solid #2f4658;
      border-radius: 10px;
      background: #08121d;
      color: var(--muted);
      padding: 12px;
      min-height: 46px;
    }
    .status.error { border-color: #7b2d47; background: #2a0f19; color: #ffd7e2; }
    .grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 12px;
    }
    .card {
      border: 1px solid #2f4658;
      border-radius: 10px;
      background: #0b141f;
      padding: 12px;
    }
    .card h3 { margin: 0 0 8px; color: #93c5fd; font-size: 1rem; }
    .terminal {
      border: 1px solid #31485d;
      border-radius: 8px;
      background: #050c14;
      color: #9ef9b6;
      padding: 10px;
      min-height: 220px;
      white-space: pre-wrap;
      font-size: 0.9rem;
      line-height: 1.45;
    }
    .actions {
      margin-top: 10px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    button {
      font: inherit;
      font-weight: 700;
      border: 0;
      border-radius: 9px;
      color: #f8fafc;
      background: linear-gradient(120deg, #0c4a6e, #0284c7);
      padding: 11px;
      cursor: pointer;
    }
    button:hover { filter: brightness(1.08); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    button.warn { background: linear-gradient(120deg, #7c2d12, #ea580c); }
    button.good { background: linear-gradient(120deg, #166534, #16a34a); }
    label { display: grid; gap: 8px; font-size: 0.95rem; margin-top: 10px; }
    input {
      font: inherit;
      border: 1px solid #2f4658;
      border-radius: 9px;
      background: #09111a;
      color: var(--text);
      padding: 11px;
    }
    .chips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .chip {
      border: 1px solid #33506a;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 0.82rem;
      color: #b7d2ea;
      background: #0a1623;
    }
    .chip.active { border-color: #22c55e; color: #b8f5cb; }
    .chip.done { border-color: #facc15; color: #fde68a; }
    @media (max-width: 780px) {
      .grid { grid-template-columns: 1fr; }
      .actions { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="panel">
    <header class="header">
      <h1>DOOMDADA Final Boss Minigame</h1>
      <p>Run the script stages in order, reconstruct the final flag, and submit.</p>
    </header>
    <section class="body">
      <div id="status" class="status">Minigame loaded. Start with story_seed().</div>

      <div class="grid">
        <section class="card">
          <h3>Mini Console</h3>
          <div id="terminalOutput" class="terminal"></div>
          <div class="actions">
            <button id="seedBtn" class="good">Run story_seed()</button>
            <button id="leetBtn" disabled>Run apply_leet()</button>
            <button id="caseBtn" disabled>Run apply_case_pattern()</button>
            <button id="buildBtn" disabled>Run build_flag()</button>
            <button id="resetBtn" class="warn">Reset Run</button>
          </div>
          <div class="chips">
            <span id="chipSeed" class="chip">seed</span>
            <span id="chipLeet" class="chip">leet</span>
            <span id="chipCase" class="chip">case</span>
            <span id="chipBuild" class="chip">build</span>
          </div>
        </section>

        <section class="card">
          <h3>Submit Flag</h3>
          <p style="margin:0;color:#9fb0c0;">Expected format: DOOM{...}</p>
          <label>
            Final Answer
            <input id="answerInput" maxlength="200" placeholder="DOOM{...}" />
          </label>
          <div class="actions" style="margin-top:10px;">
            <button id="submitBtn" class="good">Submit DOOMDADA Flag</button>
          </div>
          <div id="answerStatus" class="status" style="margin-top:10px;">Awaiting submission.</div>
        </section>
      </div>
    </section>
  </main>

  <script>
    const API_BASE = window.location.protocol === "file:" ? "http://127.0.0.1:8000" : "";
    const levelId = "doomdada";

    const statusEl = document.getElementById("status");
    const terminalEl = document.getElementById("terminalOutput");
    const answerStatusEl = document.getElementById("answerStatus");
    const answerInputEl = document.getElementById("answerInput");
    const submitBtn = document.getElementById("submitBtn");

    const seedBtn = document.getElementById("seedBtn");
    const leetBtn = document.getElementById("leetBtn");
    const caseBtn = document.getElementById("caseBtn");
    const buildBtn = document.getElementById("buildBtn");
    const resetBtn = document.getElementById("resetBtn");

    const chipSeed = document.getElementById("chipSeed");
    const chipLeet = document.getElementById("chipLeet");
    const chipCase = document.getElementById("chipCase");
    const chipBuild = document.getElementById("chipBuild");

    let phrase = "";
    let stage1 = "";
    let stage2 = "";
    let finalFlag = "";

    function apiUrl(path) {
      return `${API_BASE}${path}`;
    }

    function setStatus(text, isError = false) {
      statusEl.textContent = text;
      statusEl.classList.toggle("error", isError);
    }

    function logTerminal(text) {
      terminalEl.textContent += `${text}\n`;
      terminalEl.scrollTop = terminalEl.scrollHeight;
    }

    function markChip(chip, mode) {
      chip.classList.remove("active", "done");
      if (mode) {
        chip.classList.add(mode);
      }
    }

    function resetRun() {
      phrase = "";
      stage1 = "";
      stage2 = "";
      finalFlag = "";

      terminalEl.textContent = "root@doomdada:~$ ./boot_lockdown.sh\n[ DOOMDADA TERMINAL LOCKDOWN ]\nType-by-click execution required.\n";
      answerInputEl.value = "";
      answerStatusEl.textContent = "Awaiting submission.";
      answerStatusEl.classList.remove("error");

      seedBtn.disabled = false;
      leetBtn.disabled = true;
      caseBtn.disabled = true;
      buildBtn.disabled = true;

      markChip(chipSeed, "active");
      markChip(chipLeet, null);
      markChip(chipCase, null);
      markChip(chipBuild, null);

      setStatus("Minigame reset. Start with story_seed().");
    }

    seedBtn.addEventListener("click", () => {
      phrase = "congratulations!";
      logTerminal("root@doomdada:~$ story_seed()\n=> congratulations!");
      seedBtn.disabled = true;
      leetBtn.disabled = false;
      markChip(chipSeed, "done");
      markChip(chipLeet, "active");
      setStatus("Seed recovered. Next: apply_leet().");
    });

    leetBtn.addEventListener("click", () => {
      stage1 = "c0n6r@+ul@+i0n$!";
      logTerminal("root@doomdada:~$ apply_leet(phrase)\n=> c0n6r@+ul@+i0n$!");
      leetBtn.disabled = true;
      caseBtn.disabled = false;
      markChip(chipLeet, "done");
      markChip(chipCase, "active");
      setStatus("Leet map applied. Next: apply_case_pattern().");
    });

    caseBtn.addEventListener("click", () => {
      stage2 = "C0n6r@+Ul4tIoN$!";
      logTerminal("root@doomdada:~$ apply_case_pattern(stage1)\n=> C0n6r@+Ul4tIoN$!");
      caseBtn.disabled = true;
      buildBtn.disabled = false;
      markChip(chipCase, "done");
      markChip(chipBuild, "active");
      setStatus("Case pattern complete. Next: build_flag().");
    });

    buildBtn.addEventListener("click", () => {
      finalFlag = `DOOM{${stage2}}`;
      logTerminal(`root@doomdada:~$ build_flag()\n=> ${finalFlag}`);
      buildBtn.disabled = true;
      markChip(chipBuild, "done");
      answerInputEl.value = finalFlag;
      setStatus("Flag assembled. Submit to clear DOOMDADA.");
    });

    submitBtn.addEventListener("click", async () => {
      const answer = answerInputEl.value.trim();
      if (!answer) {
        answerStatusEl.textContent = "Answer is required.";
        answerStatusEl.classList.add("error");
        return;
      }

      submitBtn.disabled = true;
      answerStatusEl.textContent = "Checking answer...";
      answerStatusEl.classList.remove("error");

      try {
        const res = await fetch(apiUrl("/api/game/submit"), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ level_id: levelId, answer })
        });
        const data = await res.json();

        if (!res.ok) {
          answerStatusEl.textContent = data.detail || `Submit failed (HTTP ${res.status}).`;
          answerStatusEl.classList.add("error");
          return;
        }

        answerStatusEl.textContent = data.message;
        if (data.correct) {
          setStatus("DOOMDADA CLEARED. You cracked the final boss.");
          logTerminal("[ACCESS GRANTED] Final gate unlocked.");
        } else {
          answerStatusEl.classList.add("error");
        }
      } catch {
        answerStatusEl.textContent = "Network error while submitting answer.";
        answerStatusEl.classList.add("error");
      } finally {
        submitBtn.disabled = false;
      }
    });

    resetBtn.addEventListener("click", resetRun);
    resetRun();
  </script>
</body>
</html>
